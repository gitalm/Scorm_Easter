<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osterhase-Spiel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="topHUD">
        <div id="questionDisplay">Frage erscheint hier</div>
        <div id="astronautFeedback">Feedback erscheint hier</div>
    </div>
    <div id="answerContainer">
        <div class="answerBox">Antwort 1</div>
        <div class="answerBox">Antwort 2</div>
        <div class="answerBox">Antwort 3</div>
    </div>
    <div id="uiTopRight">
        <div class="ui-icon">⚙️</div>
        <div class="ui-icon">🔊</div>
    </div>
    <div id="bunny">🐰</div>
    <div id="startScreen" class="overlay">
        <div class="menu-box">
            <h1>Willkommen!</h1>
            <button id="startButton" class="main-btn">Start</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
