<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ByLKI Oster-Hase</title>
    <!-- KaTeX für Mathe -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="uiTopRight">
        <div id="muteToggle" class="ui-icon">🔇</div>
        <div id="infoToggle" class="ui-icon">?</div>
    </div>

    <div id="scoreDisplay">Punkte: 0</div>

    <div id="topHUD">
        <div id="astronautFeedback">
            <div id="astronautEmoji">🐣</div>
            <div id="astronautSpeech"></div>
        </div>
        <div id="questionDisplay">Mission startet...</div>
    </div>

    <!-- DER HASE (als HTML Element) -->
    <div id="bunny">🐇</div>

    <div id="answerContainer"></div>

    <div id="infoOverlay" class="overlay">
        <div class="info-box">
            <h2>Oster-Anleitung</h2>
            <p>Tippe auf ein Nest 🐣 oder nutze die Pfeiltasten.</p>
            <button id="closeInfoBtn">OK</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
